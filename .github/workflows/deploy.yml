name: Build and Deploy to Azure

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Fetch all MVP profiles and write getmvps/mvps.json
      # This calls the Microsoft MVP API — may take 10–20 minutes for ~4,000 profiles
      - name: Fetch MVP data
        working-directory: ./getmvps
        run: dotnet run getmvps.cs

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and publish
        run: dotnet publish mvcmcpmvp.csproj -c Release -o ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: mvp-love
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
